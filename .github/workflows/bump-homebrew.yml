name: Bump Homebrew Formula

on:
  release:
    types: [released]

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: mislav/bump-homebrew-formula-action@v4
        with:
          formula-name: mcp-bash
          homebrew-tap: yaniv-golan/homebrew-mcp-bash
          tag-name: ${{ github.event.release.tag_name }}
          download-url: https://github.com/yaniv-golan/mcp-bash-framework/releases/download/${{ github.event.release.tag_name }}/mcp-bash-${{ github.event.release.tag_name }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
